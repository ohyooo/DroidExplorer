name: CI
on: [ push, pull_request ]
jobs:
  core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: 21 }
      - run: chmod+x ./gradlew && ./gradlew :protocol:test :client-core:test :transport-adb:test :server-android:assembleRelease
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: 21 }
      - run: .\gradlew.bat build packageRelease

